aid: intermedia
name: Intermedia
description: >-
  Intermedia is a cloud communications company serving over 145,000 businesses
  with an AI-powered platform spanning voice, video conferencing, chat, SMS,
  contact center, business email, productivity, file sharing, security, and
  archiving. The Intermedia Extend API platform exposes Voice, Meeting,
  Analytics, Address Book, and Contact Center APIs for embedding communications
  into CRMs, ERPs, ticketing systems, and custom business applications.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - Cloud
  - Communications
  - Contact Center
  - Video Conferencing
  - Voice
